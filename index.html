<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<!-- ✅ FAVICON FIX -->
<link rel="icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#fff;
}

/* ================= TOP BAR ================= */
.top-bar{
background:#0066cc;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 200px;
color:white;
font-size:15px;
}

.top-caption{
font-weight:700;
font-size:16px;
}

.top-right{
display:flex;
gap:20px;
align-items:center;
}

/* ================= NAVBAR ================= */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#fff;
border-bottom:2px solid #eee;
}

/* LOGO FIX (LEFT SIDE) */
.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo-area img{
width:50px;
height:50px;
}

.logo-area h2{
font-size:24px;
font-weight:600;
color:#000;
}

/* MENU */
.menu{
display:flex;
gap:20px;
align-items:center;
}

.menu a{
text-decoration:none;
color:#000;
font-weight:600;
padding:10px;
}

/* ================= DROPDOWN FIX ================= */
.dropdown{
position:relative;
display:inline-block;
}

.dropdown-content{
display:none;
position:absolute;
top:100%;
left:0;
margin-top:10px;

min-width:260px;
background:#fff;
border:1px solid #ddd;
z-index:9999;
}

.dropdown-content a{
display:block;
padding:12px 14px;
text-decoration:none;
color:#000;
font-size:16px;
border-bottom:none;
}

.dropdown-content a:hover{
background:#f2f2f2;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* ================= CART ================= */
.cart{
position:relative;
display:flex;
align-items:center;
}

.cart img{
width:35px;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
width:20px;
height:20px;
background:red;
color:#fff;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

/* ================= HERO ================= */
.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;

/* ✅ BACKGROUND FIX */
background:url('4k-new-york.jpg') center/cover no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.hero-content{
position:relative;
z-index:2;
color:#fff;
}

.hero h1{
font-size:50px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="top-caption">GLOBAL SECURE USA & DIGITAL SERVICES</div>

    <div class="top-right">
        @GlobalTopIt | globaltopit@gmail.com
    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">

<!-- LOGO FIX -->
<div class="logo-area">
<img src="Your-paragraph-text.png" alt="logo">
<h2>GLOBAL TOP IT</h2>
</div>

<div class="menu">

<a href="#">Home</a>

<div class="dropdown">
    <a href="#">Bank Accounts</a>
    <div class="dropdown-content">
        <a href="#">USA Bank</a>
        <a href="#">UK Bank</a>
        <a href="#">Verified Accounts</a>
    </div>
</div>

<div class="dropdown">
    <a href="#">Crypto Accounts</a>
    <div class="dropdown-content">
        <a href="#">Binance</a>
        <a href="#">Coinbase</a>
        <a href="#">Wallets</a>
    </div>
</div>

<div class="dropdown">
    <a href="#">Social Accounts</a>
    <div class="dropdown-content">
        <a href="#">TikTok</a>
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
    </div>
</div>

<a href="#">Shop</a>

<div class="cart">
    <img src="add-to-cart.png">
    <span class="cart-count">0</span>
</div>

</div>

</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Welcome To Global Top It</h1>
    </div>
</section>

</body>
</html>
