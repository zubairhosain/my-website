<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<!-- 🔵 FAVICON ICON -->
<link rel="icon" type="image/png" href="Your-paragraph-text.png">

<style>

/* =========================
   BASIC RESET
========================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* =========================
   🔵 TOP BLUE BAR
========================= */
.top-bar{
background:#0066cc;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 100px;
font-size:15px;
}

/* LEFT TEXT */
.top-left{
padding-left:40px;
}

/* RIGHT AREA */
.top-right{
display:flex;
gap:20px;
padding-right:40px;
}

/* RIGHT ITEMS */
.top-right a,
.top-right span{
color:#fff;
text-decoration:none;
}

/* =========================
   NAVBAR
========================= */
.navbar{
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;

/* 👉 SIDE SPACE CONTROL (এটাই main control) */
padding-top:15px;
padding-bottom:15px;
padding-left:30px;
padding-right:7030px;

border-bottom:1px solid #eee;
}

/* LOGO AREA */
.logo{
display:flex;
align-items:center;
gap:10px;

/* 👉 LOGO MOVE CONTROL (এখানেই তুমি adjust করবে) */
margin-left:0px;
}

/* LOGO IMAGE */
.logo img{
width:45px;
height:45px;
}

/* MENU */
.menu{
display:flex;
align-items:center;
gap:25px;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

/* CART */
.cart{
position:relative;
}

.cart img{
width:28px;
}

.cart span{
position:absolute;
top:-6px;
right:-8px;
background:#0066cc;
color:#fff;
font-size:10px;
width:16px;
height:16px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

/* HERO */
.hero{
height:100vh;
background:url('4k-new-york.jpg') center/cover;
display:flex;
align-items:center;
justify-content:center;
position:relative;
color:#fff;
text-align:center;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,80,180,0.55);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:50px;
}

.hero p{
margin-top:10px;
}

.btn{
margin-top:20px;
padding:12px 25px;
background:#ff00aa;
border:none;
color:#fff;
cursor:pointer;
}

</style>
</head>

<body>

<!-- 🔵 TOP BAR -->
<div class="top-bar">

    <div class="top-left">
        Trusted Global Service with Verified USA Accounts
    </div>

    <div class="top-right">
        <a href="#">Telegram: @GlobalTopIt</a>
        <span>Email: Globaltopit@gmail.com</span>
    </div>

</div>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        <img src="Your-paragraph-text.png">
        <h2>GLOBAL TOP IT 🌐</h2>
    </div>

    <div class="menu">

        <a href="#">Home</a>
        <a href="#">Bank Accounts ⌵</a>
        <a href="#">Crypto Accounts ⌵</a>
        <a href="#">Social Accounts ⌵</a>
        <a href="#">Shop</a>

        <div class="cart">
            <img src="add-to-cart.png">
            <span>0</span>
        </div>

    </div>

</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>Welcome To Global Top It</h1>
        <p>Secure digital services worldwide</p>
        <button class="btn">VISIT SHOP</button>
    </div>
</div>

</body>
</html>
