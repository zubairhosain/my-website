<!DOCTYPE html>
<html>
<head>
  <title>Germany Top It</title>

  <!-- 🔥 Favicon (Tab Logo) -->
  <link rel="icon" type="image/png" href="Your-paragraph-text.png">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url("4k-new-york.jpg") center/cover no-repeat;
    }

    /* DARK OVERLAY */
    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      padding: 20px;
      color: white;
      text-align: center;
    }

    /* LOGO */
    .logo img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin-top: 10px;
      border: 2px solid white;
    }

    /* TITLE */
    h2 {
      margin: 10px 0;
    }

    /* OWNER */
    .name {
      font-size: 18px;
      margin-bottom: 15px;
    }

    /* MAIN BOX */
    .main-box {
      width: 90%;
      margin: auto;
      border: 3px solid white;
      border-radius: 15px;
      padding: 15px;
      background: rgba(0,0,0,0.4);
    }

    /* MENU */
    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      border-bottom: 1px solid white;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    .menu button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    .menu button:hover {
      background: #ddd;
    }

    /* CONTENT BOX */
    .box {
      display: none;
      background: white;
      color: black;
      width: 90%;
      margin: 10px auto;
      padding: 12px;
      border-radius: 10px;
      text-align: left;
    }

    /* HOME DEFAULT */
    #home {
      display: block;
    }
  </style>
</head>

<body>

<div class="overlay">

  <!-- LOGO -->
  <div class="logo">
    <img src="Your-paragraph-text.png" alt="logo">
  </div>

  <!-- TITLE -->
  <h2>Germany Top It</h2>

  <!-- OWNER -->
  <div class="name">
    Owner: MD.ZUBAIR HOSSAIN
  </div>

  <!-- MAIN BOX -->
  <div class="main-box">

    <!-- MENU -->
    <div class="menu">
      <button onclick="show('home')">Home</button>
      <button onclick="show('bank')">Bank</button>
      <button onclick="show('crypto')">Crypto</button>
      <button onclick="show('social')">Social</button>
      <button onclick="show('email')">Email</button>
      <button onclick="show('review')">Review</button>
    </div>

    <!-- CONTENT -->
    <div id="home" class="box">
      Welcome to Home Page 🚀
    </div>

    <div id="bank" class="box">
      Bank Accounts Section 🏦
    </div>

    <div id="crypto" class="box">
      Crypto Accounts Section 💰
    </div>

    <div id="social" class="box">
      Social Media Accounts 📱
    </div>

    <div id="email" class="box">
      Email Accounts 📧
    </div>

    <div id="review" class="box">
      User Reviews ⭐
    </div>

  </div>

</div>

<script>
function show(id){
  let boxes = document.querySelectorAll(".box");
  boxes.forEach(b => b.style.display = "none");
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
