<!DOCTYPE html>
<html>
<head>
  <title>Germany Top It-</title>

  <!-- 🔥 Tab Icon (Favicon) -->
  <link rel="icon" href="Your-paragraph-text.png">

  <style>
    body {
      margin: 0;
      font-family: Arial;

      /* 🔥 Background image */
      background: url("4k-new-york.jpg") center/cover no-repeat;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Logo */
    .logo img {
      width: 90px;
      border-radius: 50%;
      margin-top: 20px;
    }

    /* Name */
    .name {
      font-size: 22px;
      margin-top: 10px;
    }

    /* Menu box */
    .menu {.menu{.menu{
  border: 2px solid white;
  padding: 12px;
  display: inline-block;
  border-radius: 12px;
}

.menu button{
  margin: 5px;
  padding: 8px 12px;
}
 
    }

    /* Content box */
    .box {
      display: none;
      background: white;
      color: black;
      width: 280px;
      margin: 20px auto;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="overlay">

  <!-- 🔥 Website Logo -->
  <div class="logo">
    <img src="Your-paragraph-text.png">
  </div>

  <!-- 🔥 Website Name -->
  <h2>Germany Top It</h2>

  <!-- 🔥 Person Name -->
  <div class="name">
    Owner: MD.ZUBAIR HOSSAIN
  </div>

  <!-- 🔥 Categories -->
  <div class="main-box">
  <div class="menu">
    <button onclick="show('bank')">Bank</button>
    <button onclick="show('crypto')">Crypto</button>
    <button onclick="show('social')">Social</button>
    <button onclick="show('email')">Email</button>
    <button onclick="show('review')">Review</button>
  </div>

  <!-- 🔥 Content -->
  <div id="bank" class="box">
    <p>Buy Verified Cash App Accounts</p>
    <p>Buy verified Paysera Accounts</p>
  </div>

  <div id="crypto" class="box">
    <p>Buy Verified Binance Accounts</p>
    <p>Buy Verified PayPal Accounts</p>
    
  </div>

  <div id="social" class="box">
    <p>Buy Old TikTok Accounts</p>
    <p>Buy USA Facebook Accounts</p>
    <p>Buy Old Instagram Accounts</p>
  </div>

  <div id="email" class="box">
    <p>Buy USA Old Gmail Accounts</p>
  </div>

  <div id="review" class="box">
    <p>Review 1</p>
  </div>

</div>

<script>
function show(id){
  let boxes = document.querySelectorAll(".box");

  boxes.forEach(b => b.style.display = "none");
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
