<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* 🔵 TOP BAR */
.top-bar{
background:#0066cc;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 100px;
font-size:15px;
}

/* WRAPPER */
.container{
max-width:1200px;
margin:auto;
}

/* NAVBAR */
.navbar{
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 100px;
border-bottom:1px solid #eee;
}

/* LOGO */
.logo-area{
display:flex;
align-items:center;
gap:12px;
margin-left:-15px;
}

.logo-area img{
width:45px;
height:45px;
object-fit:contain;
}

.logo-area h2{
font-size:22px;
font-weight:500;
}

/* MENU */
.menu{
display:flex;
align-items:center;
gap:28px;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

.menu a:hover{
color:#0066cc;
}

/* CART */
.menu a img{
height:28px;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:60px 20px;
background:url('4k-new-york.jpg') center/cover no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,80,180,0.55);
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
}

.hero h1{
font-size:55px;
color:#fff;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#fff;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
background:#ff00aa;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
.top-bar,
.navbar{
flex-direction:column;
padding:15px 20px;
text-align:center;
gap:10px;
}

.hero h1{
font-size:35px;
}
}
</style>
</head>

<body>

<!-- 🔵 TOP BAR -->
<div class="top-bar">

    <div>
        Trusted Global Service with Verified USA Accounts
    </div>

    <div style="display:flex; gap:15px; align-items:center;">

        <a href="https://t.me/smmpvaexpertts" target="_blank" style="color:#fff; text-decoration:none; display:flex; align-items:center; gap:6px;">
            Telegram: @GlobalTopIt
        </a>

        <span>
            Email: Globaltopit@gmail.com
        </span>

    </div>

</div>

<!-- NAVBAR -->
<nav class="navbar container">

    <div class="logo-area">
        <img src="Your-paragraph-text.png">
        <h2>GLOBAL TOP IT 🌐</h2>
    </div>

    <div class="menu">

        <a href="#">Home</a>
        <a href="#">Bank Accounts ⌵</a>
        <a href="#">Crypto Accounts ⌵</a>
        <a href="#">Social Accounts ⌵</a>
        <a href="#">Shop</a>

        <!-- CART -->
        <a href="/cart" style="position:relative; display:inline-block;">
            <img src="add-to-cart.png">

            <span style="
                position:absolute;
                top:-6px;
                right:-8px;
                background:#0066cc;
                color:#fff;
                font-size:10px;
                width:16px;
                height:16px;
                display:flex;
                align-items:center;
                justify-content:center;
                border-radius:50%;
                font-weight:600;
            ">
                0
            </span>
        </a>

    </div>

</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Welcome To Global Top It</h1>
        <p>Secure digital services worldwide with trusted support and verified accounts.</p>
        <button class="btn">VISIT SHOP</button>
    </div>
</section>

</body>
</html>
