<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>

/* =========================
   RESET
========================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* =========================
   TOP BAR (BLUE TOP)
========================= */
.top-bar{
background:#0066cc;
color:#fff;

display:flex;
justify-content:space-between;
align-items:center;

/* 🔥 HEIGHT CONTROL */
padding-top:15px;
padding-bottom:15px;

/* 🔥 SIDE SPACE CONTROL */
padding-left:80px;
padding-right:80px;

/* 🔥 TEXT SIZE */
font-size:15px;
}

/* LEFT TEXT */
.top-left{
padding-left:10px;
}

/* RIGHT TEXT AREA */
.top-right{
display:flex;

/* 🔥 GAP BETWEEN ITEMS */
gap:20px;

/* 🔥 MOVE RIGHT SIDE */
margin-left:0px;
}

/* =========================
   NAVBAR (WHITE AREA)
========================= */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;

padding-top:15px;
padding-bottom:15px;
padding-left:80px;
padding-right:80px;

border-bottom:1px solid #eee;
background:#fff;
}

/* =========================
   LOGO AREA (LEFT SIDE)
========================= */
.logo{
display:flex;
align-items:center;

/* 🔥 GAP BETWEEN LOGO + TEXT */
gap:10px;

/* 🔥 MOVE LOGO LEFT/RIGHT */
margin-left:30px;
}

.logo img{
width:45px;
height:45px;
}

/* =========================
   MENU (RIGHT SIDE)
========================= */
.menu{
    display:flex;
    align-items:center;

    /* 🔥 GAP BETWEEN MENU ITEMS */
    gap:20px;

    /* 🔥 MENU কে বামে সরানোর জন্য */
    margin-left:-20px;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

/* =========================
   CART ICON
========================= */
.cart{
position:relative;
}

.cart img{
width:28px;
}

.cart span{
position:absolute;
top:-6px;
right:-8px;
background:#0066cc;
color:#fff;
font-size:10px;
width:16px;
height:16px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

/* =========================
   HERO SECTION
========================= */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
color:#fff;
background:url('4k-new-york.jpg') center/cover;
}

/* DARK OVERLAY */
.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,80,180,0.55);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:50px;
}

.hero p{
margin-top:10px;
}

.btn{
margin-top:20px;
padding:12px 25px;
background:#ff00aa;
border:none;
color:#fff;
cursor:pointer;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">

    <div class="top-left">
        Trusted Global Service with Verified Accounts
    </div>

    <div class="top-right">
        Email: Globaltopit@gmail.com
        Telegram: @GlobalTopIt
    </div>

</div>

<!-- NAVBAR -->
<div class="navbar">

    <!-- LOGO -->
    <div class="logo">
        <img src="Your-paragraph-text.png">
        <h2>GLOBAL TOP IT</h2>
    </div>

    <!-- MENU -->
    <div class="menu">

        <a href="#">Home</a>
        <a href="#">Bank Accounts</a>
        <a href="#">Crypto Accounts</a>
        <a href="#">Social Accounts</a>
        <a href="#">Shop</a>

        <!-- CART -->
        <div class="cart">
            <img src="add-to-cart.png">
            <span>0</span>
        </div>

    </div>

</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>Welcome To Global Top It</h1>
        <p>Secure digital services worldwide</p>
        <button class="btn">VISIT SHOP</button>
    </div>
</div>

</body>
</html>
